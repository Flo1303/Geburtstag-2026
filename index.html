<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Florians Geburtstagswunschliste 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #020617;
      --card: #111827;
      --accent: #ef4444;
      --accent2: #f97316;
      --text: #f9fafb;
      --muted: #9ca3af;
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937 0, #020617 60%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 1000px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: clamp(1.8rem, 3vw, 2.4rem);
    }

    header p {
      color: var(--muted);
      margin-top: 6px;
    }

    /* Karten */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 30px;
    }

    .card {
      perspective: 1000px;
      cursor: pointer;
      outline: none;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 160px;
      border-radius: var(--radius);
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      backface-visibility: hidden;
      padding: 15px;
      text-align: center;
    }

    .front {
      background: linear-gradient(135deg, #3b82f6, #020617);
      border: 1px solid #93c5fd;
    }

    .back {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      transform: rotateY(180deg);
    }

    .front span {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .back h3 {
      text-align: center;
      font-size: 1.05rem;
      line-height: 1.25;
    }

    /* Glücksrad */
    .spinner-box {
      background: var(--card);
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
      border: 1px solid #334155;
    }

    .spinner-box h2 {
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover { opacity: 0.9; }

    .result {
      margin-top: 15px;
      font-weight: 500;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Florians Geburtstagswunschliste 2026</h1>
      <p>Tippe auf eine Karte, um den Wunsch zu sehen – oder drehe das Glücksrad 🎁</p>
    </header>

    <section class="grid" id="wishlist"></section>

    <section class="spinner-box">
      <h2>🎉 Glücksrad</h2>
      <p>Drücke auf den Button und ein Wunsch wird zufällig ausgewählt.</p>
      <button id="spinBtn">Wunsch drehen</button>
      <div class="result" id="resultText">Noch kein Wunsch gedreht.</div>
    </section>
  </div>

  <script>
    const wishes = [
      "Edelstahlpfanne",
      "Bohrmaschine",
      "Zester (Reibe)",
      "IKEA-Gutschein",
      "Deckenlampe fürs Wohnzimmer",
      "Hokusai - Große Welle von Lego",
      "SodaStream Duo",
      "Plastikflaschen für SodaStream Duo"
    ];

    const wishlist = document.getElementById("wishlist");

    wishes.forEach((wish, index) => {
      const card = document.createElement("div");
      card.className = "card";
      card.setAttribute("tabindex", "0");
      card.setAttribute("role", "button");
      card.setAttribute("aria-label", `Wunschkarte ${index + 1} umdrehen`);

      card.innerHTML = `
        <div class="card-inner">
          <div class="face front">
            <span>🎁</span>
            <strong>Karte #${index + 1}</strong>
          </div>
          <div class="face back">
            <h3>${wish}</h3>
          </div>
        </div>
      `;

      const toggle = () => card.classList.toggle("flipped");

      card.addEventListener("click", toggle);
      card.addEventListener("keydown", (e) => {
        if (e.code === "Enter" || e.code === "Space") {
          e.preventDefault();
          toggle();
        }
      });

      wishlist.appendChild(card);
    });

    const spinBtn = document.getElementById("spinBtn");
    const resultText = document.getElementById("resultText");
    let spinning = false;

    spinBtn.addEventListener("click", () => {
      if (spinning) return;
      spinning = true;

      let ticks = 0;
      const maxTicks = 20 + Math.floor(Math.random() * 10);
      let finalWish = wishes[0];

      const interval = setInterval(() => {
        finalWish = wishes[Math.floor(Math.random() * wishes.length)];
        resultText.textContent = "Vielleicht dieses Jahr: " + finalWish;
        ticks++;

        if (ticks >= maxTicks) {
          clearInterval(interval);
          resultText.textContent = "🎉 Ausgewählter Wunsch: " + finalWish;
          spinning = false;
        }
      }, 90);
    });
  </script>
</body>
</html>
